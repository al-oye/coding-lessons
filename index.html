<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Порахуй середній бал</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 2em;
      background: #f9f9f9;
    }
    textarea {
      width: 100%;
      height: 200px;
      font-family: monospace;
      font-size: 14px;
    }
    button {
      margin-right: 1em;
      padding: 10px 20px;
      font-size: 16px;
    }
    pre {
      background: #eee;
      padding: 1em;
    }
  </style>
</head>
<body>
  <h1>Порахуй середній бал</h1>
  <p>Введи оцінки з 5 предметів у список <code>marks</code> і натисни «Запустити».</p>

  <textarea id="code">
// Введи свої оцінки нижче:
let marks = [12, 11, 10, 9, 11];

let sum = 0;
for (let i = 0; i < marks.length; i++) {
  sum += marks[i];
}
let average = sum / marks.length;

console.log("Середній бал: " + average.toFixed(2));
  </textarea>

  <div>
    <button onclick="runCode()">Запустити</button>
    <button onclick="clearOutput()">Очистити</button>
  </div>

  <h3>Результат:</h3>
  <pre id="output"></pre>

  <script>
    function runCode() {
      const code = document.getElementById("code").value;
      localStorage.setItem("savedCode", code);
      const oldLog = console.log;
      const outputEl = document.getElementById("output");
      outputEl.textContent = "";
      console.log = function(message) {
        outputEl.textContent += message + "\n";
      };
      try {
        new Function(code)();
      } catch (e) {
        outputEl.textContent = "Помилка: " + e.message;
      }
      console.log = oldLog;
    }

    function clearOutput() {
      document.getElementById("output").textContent = "";
    }

    // Повертаємо останній збережений код
    window.onload = function() {
      const saved = localStorage.getItem("savedCode");
      if (saved) document.getElementById("code").value = saved;
    };
  </script>
</body>
</html>
